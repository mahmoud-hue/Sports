name: Daily News Automation

on:
  schedule:
    - cron: '15 14 * * *'  # كل يوم الساعة 2:15 ظهر
  workflow_dispatch:       # عشان تشغله يدوي كمان

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install libraries
        run: |
          pip install feedparser pandas openpyxl gspread oauth2client

      - name: Run script
        run: python script.py

      - name: Upload to Google Drive
        uses: gdrive-org/gdrive-upload-action@v1
        with:
          service_account_json: ${{ secrets.GDRIVE_CREDENTIALS }}
          folder_id: "PUT_YOUR_FOLDER_ID_HERE"
          src: "*.xlsx"
