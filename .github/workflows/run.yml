name: Daily News Automation

on:
  schedule:
    - cron: '10 12 * * *'  # كل يوم الساعة 2:15 ظهر
  workflow_dispatch:       # عشان تشغله يدوي كمان

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install libraries
        run: |
          pip install feedparser pandas openpyxl

      - name: Run script
        run: python script.py

      - name: Upload file as artifact
        uses: actions/upload-artifact@v3
        with:
          name: news-file
          path: "*.xlsx"
